<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Cine ESPOL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="h-full bg-gradient-to-br from-gray-900 via-purple-900 to-violet-900 font-['Poppins']">
    <div class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <div class="text-center mb-10">
                <a href="/" class="inline-block mb-4">
                    <span class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-500">
                        Cine ESPOL
                    </span>
                </a>
                <h2 class="text-2xl font-bold text-white">Inicia sesión</h2>
                <p class="text-gray-400 mt-2">Bienvenido de vuelta</p>
            </div>

            <div class="bg-black bg-opacity-50 backdrop-blur-lg rounded-xl p-8 border border-gray-800 shadow-2xl">
                <form id="login-form">
                    <div class="space-y-5">
                        <div>
                            <label for="login-email" class="block text-sm font-medium text-gray-300 mb-1">Correo ESPOL</label>
                            <input type="email" id="login-email" required placeholder="usuario@espol.edu.ec"
                                class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition duration-200">
                        </div>

                        <div>
                            <label for="login-password" class="block text-sm font-medium text-gray-300 mb-1">Contraseña</label>
                            <input type="password" id="login-password" required
                                class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition duration-200">
                        </div>

                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <input id="remember-me" name="remember-me" type="checkbox" 
                                    class="h-4 w-4 text-amber-500 focus:ring-amber-500 border-gray-700 rounded bg-gray-800">
                                <label for="remember-me" class="ml-2 block text-sm text-gray-300">Recordarme</label>
                            </div>
                            <a href="#" class="text-sm text-amber-400 hover:text-amber-300">¿Olvidaste tu contraseña?</a>
                        </div>

                        <button type="submit" class="w-full py-3 px-6 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-medium rounded-lg transition-all duration-300 transform hover:scale-[1.02] shadow-lg hover:shadow-xl">
                            Iniciar Sesión
                        </button>
                    </div>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-400">¿No tienes cuenta? <a href="/register" class="text-amber-400 hover:text-amber-300 font-medium">Regístrate</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
