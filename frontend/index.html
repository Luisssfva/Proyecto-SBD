<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cine ESPOL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="h-full bg-gradient-to-br from-gray-900 via-purple-900 to-violet-900 font-['Poppins']">
    <div class="min-h-screen flex flex-col justify-center items-center px-4 py-12">
        <div class="text-center mb-12">
            <h1 class="text-5xl md:text-6xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-amber-500 mb-4">
                Cine ESPOL
            </h1>
            <p class="text-xl text-gray-300 max-w-2xl mx-auto">
                Vive la magia del cine con los mejores estrenos en pantalla gigante
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl w-full">
            <div class="bg-black bg-opacity-50 backdrop-blur-lg rounded-xl p-8 border border-gray-800 shadow-2xl">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-semibold text-white mb-2">¿Primera vez?</h2>
                    <p class="text-gray-400">Crea tu cuenta para reservar boletos</p>
                </div>
                <a href="/register" class="block w-full py-3 px-6 bg-gradient-to-r from-amber-500 to-yellow-600 hover:from-amber-600 hover:to-yellow-700 text-white font-medium rounded-lg text-center transition-all duration-300 transform hover:scale-105 shadow-lg hover:shadow-xl">
                    Registrarse
                </a>
            </div>

            <div class="bg-black bg-opacity-50 backdrop-blur-lg rounded-xl p-8 border border-gray-800 shadow-2xl">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-semibold text-white mb-2">¿Ya tienes cuenta?</h2>
                    <p class="text-gray-400">Inicia sesión para continuar</p>
                </div>
                <a href="/login" class="block w-full py-3 px-6 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-medium rounded-lg text-center transition-all duration-300 transform hover:scale-105 shadow-lg hover:shadow-xl">
                    Iniciar Sesión
                </a>
            </div>
        </div>

        <div class="mt-16 grid grid-cols-2 md:grid-cols-4 gap-6 max-w-6xl">
            <div class="h-40 rounded-xl bg-cover bg-center" style="background-image: url('https://source.unsplash.com/random/300x450/?movie,poster,1')"></div>
            <div class="h-40 rounded-xl bg-cover bg-center" style="background-image: url('https://source.unsplash.com/random/300x450/?movie,poster,2')"></div>
            <div class="h-40 rounded-xl bg-cover bg-center" style="background-image: url('https://source.unsplash.com/random/300x450/?movie,poster,3')"></div>
            <div class="h-40 rounded-xl bg-cover bg-center" style="background-image: url('https://source.unsplash.com/random/300x450/?movie,poster,4')"></div>
        </div>
    </div>
</body>
</html>
