<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CinePolito</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-white font-sans">

  <section class="min-h-screen flex items-center justify-center bg-gradient-to-b from-gray-800 to-gray-900">
    <div class="text-center animate-fade-in">
      <h1 class="text-5xl font-extrabold mb-6 text-yellow-400 drop-shadow-lg">Bienvenidos a CinePolito</h1>
      <p class="text-xl mb-8 text-gray-300 italic">Donde la función no diverge... ¡se disfruta!</p>
      <div class="flex justify-center space-x-6">
        <a href="#login" class="bg-blue-600 hover:bg-blue-700 px-8 py-3 rounded-xl text-white font-semibold transition-all duration-300 transform hover:scale-105">Iniciar Sesión</a>
        <a href="#signup" class="bg-green-600 hover:bg-green-700 px-8 py-3 rounded-xl text-white font-semibold transition-all duration-300 transform hover:scale-105">Registrarse</a>
      </div>
    </div>
  </section>

  <section id="login" class="min-h-screen flex items-center justify-center bg-gray-800">
    <div class="w-full max-w-md p-8 bg-gray-700 rounded-2xl shadow-xl">
      <h2 class="text-3xl font-bold mb-6 text-center text-blue-400">Iniciar Sesión</h2>
      <form class="space-y-5">
        <input type="email" placeholder="Correo electrónico" class="w-full px-4 py-3 rounded bg-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <input type="password" placeholder="Contraseña" class="w-full px-4 py-3 rounded bg-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-semibold transition duration-300">Ingresar</button>
      </form>
    </div>
  </section>

  <section id="signup" class="min-h-screen flex items-center justify-center bg-gray-800">
    <div class="w-full max-w-md p-8 bg-gray-700 rounded-2xl shadow-xl">
      <h2 class="text-3xl font-bold mb-6 text-center text-green-400">Registrarse</h2>
      <form class="space-y-5">
        <input type="text" placeholder="Nombre completo" class="w-full px-4 py-3 rounded bg-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500">
        <input type="email" placeholder="Correo electrónico" class="w-full px-4 py-3 rounded bg-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500">
        <input type="password" placeholder="Contraseña" class="w-full px-4 py-3 rounded bg-gray-600 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-green-500">
        <button class="w-full bg-green-600 hover:bg-green-700 py-3 rounded-xl font-semibold transition duration-300">Crear cuenta</button>
      </form>
    </div>
  </section>

  <section id="home" class="min-h-screen bg-gray-900 px-6 py-16">
    <h2 class="text-4xl font-extrabold text-center mb-12 text-yellow-400">Cartelera de CinePolito</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
      <div class="bg-gray-700 rounded-2xl p-5 shadow-xl hover:shadow-2xl transition duration-300">
        <img src="https://via.placeholder.com/300x400" class="rounded-xl mb-4 w-full h-80 object-cover">
        <h3 class="text-2xl font-bold mb-2">Matrix: Reboot</h3>
        <p class="mb-4 text-gray-300">Horario: 18:00 | Sala 1</p>
        <button class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-xl font-semibold w-full transition transform hover:scale-105">Reservar</button>
      </div>
      <div class="bg-gray-700 rounded-2xl p-5 shadow-xl hover:shadow-2xl transition duration-300">
        <img src="https://via.placeholder.com/300x400" class="rounded-xl mb-4 w-full h-80 object-cover">
        <h3 class="text-2xl font-bold mb-2">Interestelar</h3>
        <p class="mb-4 text-gray-300">Horario: 20:00 | Sala 2</p>
        <button class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-xl font-semibold w-full transition transform hover:scale-105">Reservar</button>
      </div>
      <div class="bg-gray-700 rounded-2xl p-5 shadow-xl hover:shadow-2xl transition duration-300">
        <img src="https://via.placeholder.com/300x400" class="rounded-xl mb-4 w-full h-80 object-cover">
        <h3 class="text-2xl font-bold mb-2">Los Vengadores: Código Final</h3>
        <p class="mb-4 text-gray-300">Horario: 16:30 | Sala 3</p>
        <button class="bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-xl font-semibold w-full transition transform hover:scale-105">Reservar</button>
      </div>
    </div>
  </section>

</body>
</html>
